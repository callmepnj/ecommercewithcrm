<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.4"/>
      <stop offset="70%" style="stop-color:#DAA520;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#800020;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#800020"/>
      <stop offset="100%" style="stop-color:#5a0016"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#DAA520"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)" stroke="#DAA520" stroke-width="6"/>
  <!-- Glow effect -->
  <circle cx="256" cy="230" r="180" fill="url(#glow)"/>
  <!-- Letter A with glow -->
  <text x="256" y="340" text-anchor="middle" font-family="serif" font-weight="bold" font-size="320" fill="url(#letterGrad)" filter="url(#glowFilter)">A</text>
  <!-- Small decorative dot -->
  <circle cx="256" cy="400" r="8" fill="#DAA520"/>
</svg>
